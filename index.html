<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mauritius Lead Beast</title>

<style>
body { margin:0; font-family:Arial; background:#f5f7fa; }

/* HEADER */
header {
    background:#0a2540;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}

/* LAYOUT */
.layout {
    display:grid;
    grid-template-columns: 280px 1fr;
    height:100vh;
}

/* SIDEBAR */
.sidebar {
    background:#111827;
    color:white;
    padding:20px;
}

.sidebar input, .sidebar select {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:6px;
    border:none;
}

.sidebar button {
    width:100%;
    padding:12px;
    background:gold;
    border:none;
    font-weight:bold;
}

/* MAIN */
.main {
    padding:20px;
    overflow:auto;
}

.card {
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

/* PROPERTY */
.property {
    border-bottom:1px solid #ddd;
    padding:10px;
}

/* SEARCH */
.search {
    width:100%;
    padding:12px;
    margin-bottom:15px;
}

/* LOCK */
.lock { color:red; font-weight:bold; }

.hidden { display:none; }
</style>
</head>

<body>

<header>Mauritius Lead Beast System</header>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>Agent</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<button onclick="register()">WhatsApp</button>

<h3>Add Property</h3>

<select id="village"></select>
<select id="category"></select>

<input id="pid" placeholder="Property ID">
<input id="type" placeholder="Type">
<input id="sale" placeholder="Sale Price">
<input id="rent" placeholder="Rent Range">
<input id="status" placeholder="Status">

<button onclick="addProperty()">Add</button>

</div>

<!-- MAIN -->
<div class="main">

<div class="card">
<input class="search" id="search" placeholder="Search..." onkeyup="searchListings()">
<div id="listings"></div>
</div>

<div class="card">
<h3>Unlock Leads 🔐</h3>

<select id="leadVillage"></select>
<select id="leadCategory"></select>

<input id="password" placeholder="Password">
<button onclick="unlock()">Unlock</button>

<div id="leadsBox" class="hidden">
<ul id="leadList"></ul>

<textarea id="report" placeholder="Follow-up"></textarea>
<button onclick="sendReport()">Send</button>
</div>

</div>

</div>

</div>

<script>

/* 🔥 MASTER SYSTEM */
const system = {

grandbaie: {
    categories: {
        villa: {
            password: "1111",
            leads: ["+230 590001"],
            listings: []
        },
        apartment: {
            password: "2222",
            leads: ["+230 590002"],
            listings: []
        },
        melvillegreen: {
            password: "3333",
            leads: ["+230 590003"],
            listings: []
        }
    }
},

grandgaube: {
    categories: {
        villa: {
            password: "4444",
            leads: ["+230 580001"],
            listings: []
        }
    }
},

triolet: {
    categories: {
        villa: {
            password: "5555",
            leads: ["+230 570001"],
            listings: []
        }
    }
}

};

/* LOAD VILLAGES */
function loadVillages(){
    for(let v in system){
        village.innerHTML += `<option value="${v}">${v}</option>`;
        leadVillage.innerHTML += `<option value="${v}">${v}</option>`;
    }
}

/* LOAD CATEGORY */
function loadCategories(){
    let v = village.value;
    category.innerHTML = "";

    for(let c in system[v].categories){
        category.innerHTML += `<option value="${c}">${c}</option>`;
    }
}

function loadLeadCategories(){
    let v = leadVillage.value;
    leadCategory.innerHTML = "";

    for(let c in system[v].categories){
        leadCategory.innerHTML += `<option value="${c}">${c}</option>`;
    }
}

village.onchange = loadCategories;
leadVillage.onchange = loadLeadCategories;

loadVillages();
loadCategories();
loadLeadCategories();

/* REGISTER */
function register(){
    let msg = `Agent:%0A${name.value}%0APhone:${phone.value}`;
    window.open(`https://wa.me/23059237053?text=${msg}`);
}

/* ADD PROPERTY */
function addProperty(){

    let v = village.value;
    let c = category.value;

    system[v].categories[c].listings.push({
        id: pid.value,
        type: type.value,
        sale: sale.value,
        rent: rent.value,
        status: status.value
    });

    render();
}

/* RENDER */
function render(){
    listings.innerHTML = "";

    for(let v in system){
        for(let c in system[v].categories){

            system[v].categories[c].listings.forEach(p => {

                listings.innerHTML += `
                <div class="property">
                    <b>${p.id}</b> (${v} - ${c})<br>
                    ${p.type}<br>
                    💰 ${p.sale} | 🏠 ${p.rent}<br>
                    📊 ${p.status}<br>
                    <span class="lock">🔒 Protected Leads</span>
                </div>
                `;
            });

        }
    }
}

/* SEARCH */
function searchListings(){
    let input = search.value.toLowerCase();
    let items = document.querySelectorAll(".property");

    items.forEach(i => {
        i.style.display = i.innerText.toLowerCase().includes(input) ? "block" : "none";
    });
}

/* UNLOCK */
function unlock(){

    let v = leadVillage.value;
    let c = leadCategory.value;

    if(system[v].categories[c].password === password.value){

        leadsBox.classList.remove("hidden");

        leadList.innerHTML = "";

        system[v].categories[c].leads.forEach(l => {
            leadList.innerHTML += `<li>${l}</li>`;
        });

    } else {
        alert("Wrong Password");
    }
}

/* REPORT */
function sendReport(){
    let msg = `Follow-up:%0A${report.value}`;
    window.open(`https://wa.me/23059237053?text=${msg}`);
}

</script>

</body>
</html>
